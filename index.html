<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RoyalWin Casino</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.header {
  padding:15px;
  text-align:center;
  font-size:20px;
}

.card {
  margin:15px;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(135deg,#1e293b,#334155);
}

.balance {
  font-size:28px;
  margin-top:10px;
}

.btn {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:gold;
  color:black;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:15px;
}

.item {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">RoyalWin Casino</div>

<div class="card">
  <div><b>User: demo123</b></div>
  <div class="balance">৳ 1000</div>

  <button class="btn" onclick="showDeposit()">Deposit</button>
  <button class="btn" onclick="showWithdraw()">Withdraw</button>
</div>

<div class="grid">
  <div class="item">Reward</div>
  <div class="item">Bet</div>
  <div class="item">History</div>
  <div class="item">VIP</div>
  <div class="item">Support</div>
  <div class="item">Logout</div>
</div>

<script>
function showDeposit(){
  alert("Send money to:\nBkash: 01XXXXXXXXX\nThen submit TXN ID");
}

function showWithdraw(){
  alert("Enter withdraw request (manual approval)");
}
</script>
<div style="padding:20px;">
  <h2>🎰 Color Game</h2>

  <p>Balance: ৳ <span id="balance">1000</span></p>

  <button onclick="bet('red')" style="background:red;color:white;padding:10px;">Bet Red</button>
  <button onclick="bet('green')" style="background:green;color:white;padding:10px;">Bet Green</button>

  <p id="result"></p>
</div>

<script>
let balance = 1000;

function bet(color){
  let betAmount = 100;

  if(balance < betAmount){
    alert("Not enough balance");
    return;
  }

  let random = Math.random();
  let winColor = random > 0.5 ? "red" : "green";

  if(color === winColor){
    balance += betAmount;
    document.getElementById("result").innerText = "You Win! Color: " + winColor;
  } else {
    balance -= betAmount;
    document.getElementById("result").innerText = "You Lose! Color: " + winColor;
  }

  document.getElementById("balance").innerText = balance;
}
</script>
</body>
</html>
